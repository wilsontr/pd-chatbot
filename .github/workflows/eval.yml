name: Evaluation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_generation:
        description: 'Run generation (LLM-as-judge) eval'
        type: boolean
        default: false
      sample:
        description: 'Number of generation samples'
        type: string
        default: '5'

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write  # needed for auto-commit of EVAL.md

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Build ChromaDB index (embeddings must be precomputed)
        env:
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: |
          python embed_and_index.py

      - name: Run retrieval evaluation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: |
          python -m evaluation.evaluate --retrieval --report EVAL.md --quiet

      - name: Commit updated EVAL.md
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'ci: update evaluation results [skip ci]'
          file_pattern: EVAL.md
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com

      - name: Run generation evaluation (sampled)
        if: github.event_name == 'workflow_dispatch' && inputs.run_generation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: |
          python -m evaluation.evaluate --generation --sample ${{ inputs.sample }} --quiet

      - name: Run pytest (threshold assertions)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: |
          pytest tests/ -v
